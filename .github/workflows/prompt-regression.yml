name: Prompt and schema regression
on:
  pull_request:
    paths:
      - 'prompt.md'
      - 'backend/config.js'
      - 'backend/schemas/**'
      - 'backend/services/**'
      - 'backend/auditService.js'
      - 'backend/routes/**'
      - 'backend/tests/**'
      - 'backend/package.json'
      - 'backend/package-lock.json'
      - '.github/workflows/prompt-regression.yml'
  push:
    branches: [main]
    paths:
      - 'prompt.md'
      - 'backend/config.js'
      - 'backend/schemas/**'
      - 'backend/services/**'
      - 'backend/auditService.js'
      - 'backend/routes/**'
      - 'backend/tests/**'
      - 'backend/package.json'
      - 'backend/package-lock.json'
      - '.github/workflows/prompt-regression.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run verify:migrations
      - run: npm test -- --runInBand
      - name: Prove cross-institution RLS isolation
        if: ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_ANON_KEY != '' && secrets.RLS_TEST_USER_A_TOKEN != '' && secrets.RLS_TEST_USER_B_INSTITUTION_ID != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          RLS_TEST_USER_A_TOKEN: ${{ secrets.RLS_TEST_USER_A_TOKEN }}
          RLS_TEST_USER_B_INSTITUTION_ID: ${{ secrets.RLS_TEST_USER_B_INSTITUTION_ID }}
        run: npm test -- --runInBand tests/rlsIsolation.test.js
