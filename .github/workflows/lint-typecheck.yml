name: Application quality

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'prompt.md'
      - 'package-lock.json'
      - '.github/workflows/lint-typecheck.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'prompt.md'
      - 'package-lock.json'
      - '.github/workflows/lint-typecheck.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run verify:migrations
      - run: npm test -- --runInBand

  frontend-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx expo export --platform web --output-dir dist-ci --no-bytecode
